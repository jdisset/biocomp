# Canonical parts-db composition entry point.
#
# Shipped with biocomp; written verbatim into each parts-db folder by
# biocomp.library.dump_lib_to_yaml. Composes the per-table primitives and the
# per-id yaml files under L0/ L1/ L2/ sequestrons/ into a single PartsLibrary.

!PartsLibrary
!define _files_under: !fn
  !require sub: "subdir under parts-db containing per-id *.yaml files"
  !fn :
    !each(f) ${sorted([x for x in listdir(DIR + '/' + sub) if x.endswith('.yaml')])}:
      - !include file:${DIR + '/' + sub + '/' + f}

categories:       !include file:$DIR/primitives/categories.yaml
parts:            !include file:$DIR/primitives/parts.yaml
sequestron_types: !include file:$DIR/primitives/sequestron_types.yaml
L0s:          !_files_under L0
L1s:          !_files_under L1
L2s:          !_files_under L2
sequestrons:  !_files_under sequestrons
