<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="100" height="100" fill="white"/>
<!-- Shapes exactly at viewbox boundaries -->
<rect x="0" y="0" width="10" height="100" fill="black"/>
<rect x="90" y="0" width="10" height="100" fill="#666666"/>
<rect x="0" y="0" width="100" height="10" fill="#333333"/>
<rect x="0" y="90" width="100" height="10" fill="#999999"/>
</svg>
