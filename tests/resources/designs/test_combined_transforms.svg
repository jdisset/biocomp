<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="100" height="100" fill="white"/>
<!-- Group with translate, containing a rotated rectangle -->
<g transform="translate(50, 50)">
  <rect width="30" height="10" transform="rotate(45)" fill="black"/>
</g>
<!-- Another rectangle with scale -->
<rect x="5" y="5" width="10" height="10" transform="scale(2)" fill="#666666"/>
</svg>
