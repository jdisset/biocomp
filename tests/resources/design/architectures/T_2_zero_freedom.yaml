<<(<): !include file:$DIR/common.yaml

# Zero-freedom scaffold: EXACTLY matches original T_2 recipe
# All ratios are FIXED (not ${RATIO}), all uORFs are fixed, bias is fixed
# Used for CMAES validation - optimizer should have no effect

!define BIAS_FLUO_COTX3: !biocomp.recipe.FluoIntensity
  tu_id: 0
  value: 0.4  # Best bias value from Phase 1
  protein: mMaroon1
  units: "Rescaled AU"
  locked: true

recipe: !biocomp.recipe.Recipe
  name: "T_2_zero_freedom"
  description: "T_2 with ALL parameters locked (zero degrees of freedom)"
  input_order: [eBFP2, mKO2]
  axis_mapping:
    cotx1: y
    cotx2: x
  metadata:
    ng_dna: 610.0
  content:
    - !biocomp.recipe.CoTransfection
      name: cotx1
      units:
        - !biocomp.recipe.TranscriptionUnit
          name: L1.ST2-3_mKO2
          slots: [cHS4, hEF1a, mKO2, L0.T_4560]
        - !biocomp.recipe.TranscriptionUnit
          name: L1.ST1-2_4xmNG
          slots: [cHS4, hEF1a, 4x_uORF, mNeonGreen, L0.T_4560]
      ratios:
        L1.ST2-3_mKO2: {value: 0.08196721311475409, locked: true}
        L1.ST1-2_4xmNG: {value: 0.16393442622950818, locked: true}
    - !biocomp.recipe.CoTransfection
      name: cotx2
      units:
        - !biocomp.recipe.TranscriptionUnit
          name: L1.ST2-3_EBFP2
          slots: [cHS4, hEF1a, eBFP2, L0.T_4560]
        - !biocomp.recipe.TranscriptionUnit
          name: L1.ST1-2_8xCasE
          slots: [cHS4, hEF1a, 8x_uORF, CasE, L0.T_4560]
        - !biocomp.recipe.TranscriptionUnit
          name: L1.0x_Csy4_ST1-2
          slots: [cHS4, hEF1a, Csy4, L0.T_4560]
      ratios:
        L1.ST2-3_EBFP2: {value: 0.08196721311475409, locked: true}
        L1.ST1-2_8xCasE: {value: 0.16393442622950818, locked: true}
        L1.0x_Csy4_ST1-2: {value: 0.01639344262295082, locked: true}
    - !biocomp.recipe.CoTransfection
      name: cotx3
      units:
        - !biocomp.recipe.TranscriptionUnit
          name: L1.ST1-2_mMaroon1
          slots: [cHS4, hEF1a, mMaroon1, L0.T_4560]
        - !biocomp.recipe.TranscriptionUnit
          name: L1.ST2-3_CasER_mNG
          slots: [cHS4, hEF1a, CasE_rec, mNeonGreen, L0.T_4560]
        - !biocomp.recipe.TranscriptionUnit
          name: L1.ST1-2_1xCsy4R_CasE
          slots: [cHS4, hEF1a, Csy4_rec, 1x_uORF, CasE, L0.T_4560]
      ratios:
        L1.ST1-2_mMaroon1: {value: 0.08196721311475409, locked: true}
        L1.ST2-3_CasER_mNG: {value: 0.2459016393442623, locked: true}
        L1.ST1-2_1xCsy4R_CasE: {value: 0.16393442622950818, locked: true}
      fluo_bias: "${BIAS_FLUO_COTX3}"
